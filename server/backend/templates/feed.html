{% extends "base.html" %}

{% block title %}Feed{% endblock title %}

{% block extra_css %}
  <link rel="preload" href="/static/css/pagination.css" as="style">
  <link rel="stylesheet" href="/static/css/pagination.css">
  <link rel="preload" href="/static/css/feed.css" as="style">
  <link rel="stylesheet" href="/static/css/feed.css">
{% endblock extra_css %}

{% block content %}
  <div class="feed" id="feedContainer">
    <!-- posts list panel -->
    <div class="posts-panel">
      <div class="intro">
        <h1>Feed</h1>
        <p>Consolidated list of neat posts from various sources</p>
      </div>

      <!-- skeleton loading placeholder -->
      <div class="posts" id="postsList">
        <article class="post-card skeleton"></article>
        <article class="post-card skeleton"></article>
        <article class="post-card skeleton"></article>
        <article class="post-card skeleton"></article>
        <article class="post-card skeleton"></article>
        <article class="post-card skeleton"></article>
      </div>
    </div>

    <!-- detail panel (slides in from right) -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-header">
        <button class="detail-close" id="detailClose" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <span class="detail-title" id="detailTitle"></span>
        <a id="detailLink" href="#" target="_blank" rel="noopener noreferrer" class="detail-external" aria-label="Open original">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
            <polyline points="15 3 21 3 21 9"></polyline>
            <line x1="10" y1="14" x2="21" y2="3"></line>
          </svg>
        </a>
      </div>
      <div class="detail-body">
        <div class="detail-loading" id="detailLoading">Loading...</div>
        <iframe
          id="detailFrame"
          sandbox="allow-same-origin allow-scripts allow-popups allow-modals allow-forms"
          loading="lazy"
        ></iframe>
      </div>
    </div>
  </div>
{% endblock content %}

{% block extra_js %}
<script type="module">
  import { initFeed } from '/static/js/feed.js';
  initFeed({
    containerSelector: '#postsList',
    perPage: 24,
  });
</script>
{% endblock extra_js %}
