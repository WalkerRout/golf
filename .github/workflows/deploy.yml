name: deploy to homelab

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: checkout codebase
        uses: actions/checkout@v4

      - name: build image
        env:
          RUST_TARGET: ${{ secrets.RUST_TARGET }}
        run: |
          docker compose -f compose.production.yml --profile production build

      - name: tag and push to registry
        run: |
          docker tag golf-server-production:latest registry.local:30500/golf-server:latest
          max_attempts=5
          for i in $(seq 1 $max_attempts); do
            echo "Push attempt $i of $max_attempts..."
            if docker push registry.local:30500/golf-server:latest; then
              echo "Push succeeded"
              exit 0
            fi
            if [ $i -lt $max_attempts ]; then
              sleep_time=$((2 ** i * 5))
              echo "Push failed, retrying in ${sleep_time}s..."
              sleep $sleep_time
            fi
          done
          echo "All push attempts failed"
          exit 1

      - name: deploy
        run: |
          kubectl apply -f k8s/
          kubectl rollout restart deployment/golf-server
